version: '3.8'

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vuln_scanner_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    restart: unless-stopped
    networks:
      - vuln_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vuln_scanner_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - vuln_network

networks:
  vuln_network:
    driver: bridge
